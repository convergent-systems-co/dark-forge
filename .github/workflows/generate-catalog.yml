name: Generate HTML Catalog

on:
  push:
    branches: [main]
    paths:
      - "governance/prompts/reviews/**"
      - "prompts/global/**"
      - "bin/generate-html-catalog.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    name: generate-html-catalog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate catalog
        run: python bin/generate-html-catalog.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet catalog.json docs/catalog.html && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit updated catalog
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog.json docs/catalog.html
          git commit -m "chore: regenerate HTML prompt catalog [skip ci]"
          git push
