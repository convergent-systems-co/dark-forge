name: Self-Repair Workflow Lint

# Detects actionlint errors in workflow files and creates a GitHub issue
# with the lint results for manual or agentic remediation.
#
# This workflow is part of Phase 4b (Autonomous Remediation) — self-repair
# CI workflows that maintain repository health autonomously.
#
# Note: jm-compliance.yml is enterprise-locked and must never be modified
# by any automated fix. Lint errors in that file are reported but excluded
# from any fix PRs.

on:
  push:
    branches: [main]
    paths: ['.github/workflows/**']
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: self-repair-lint
  cancel-in-progress: true

jobs:
  lint-and-report:
    name: lint-and-report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install actionlint
        run: |
          set -euo pipefail
          ACTIONLINT_VERSION="1.7.7"
          DOWNLOAD_URL="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"

          echo "Installing actionlint v${ACTIONLINT_VERSION}..."
          curl -sSL "$DOWNLOAD_URL" -o /tmp/actionlint.tar.gz
          tar xz -C /usr/local/bin -f /tmp/actionlint.tar.gz actionlint
          rm -f /tmp/actionlint.tar.gz

          actionlint --version

      - name: Run actionlint
        id: lint
        run: |
          set -uo pipefail

          # Run actionlint with JSON output; capture exit code
          # actionlint exits non-zero when errors are found, so we capture rather than fail
          LINT_EXIT=0
          actionlint -format '{{json .}}' .github/workflows/*.yml > /tmp/lint-raw.json 2>&1 || LINT_EXIT=$?

          # actionlint outputs one JSON object per line (JSONL), not a JSON array.
          # Convert to a proper JSON array for downstream processing.
          if [ -s /tmp/lint-raw.json ]; then
            jq -s '.' /tmp/lint-raw.json > /tmp/lint-results.json 2>/dev/null || {
              echo "::warning::Failed to parse actionlint output as JSON"
              echo "[]" > /tmp/lint-results.json
            }
          else
            echo "[]" > /tmp/lint-results.json
          fi

          ERROR_COUNT=$(jq 'length' /tmp/lint-results.json)
          echo "error_count=${ERROR_COUNT}" >> "$GITHUB_OUTPUT"

          if [ "$ERROR_COUNT" -gt "0" ]; then
            echo "has_errors=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Found ${ERROR_COUNT} actionlint error(s)"

            # Build a human-readable summary for the issue body
            {
              echo "## Actionlint Errors"
              echo ""
              echo "Found **${ERROR_COUNT}** error(s) in workflow files."
              echo ""
              echo "| File | Line | Column | Message |"
              echo "|------|------|--------|---------|"
              jq -r '.[] | "| `\(.filepath)` | \(.line) | \(.column) | \(.message) |"' /tmp/lint-results.json
              echo ""
              echo "### Raw Output"
              echo ""
              echo '```json'
              jq '.' /tmp/lint-results.json
              echo '```'
              echo ""
              echo "---"
              echo "*Generated by self-repair-lint workflow — run ID: ${{ github.run_id }}*"
            } > /tmp/issue-body.md

          else
            echo "has_errors=false" >> "$GITHUB_OUTPUT"
            echo "No actionlint errors found"
          fi

      - name: Check for existing open lint issue
        if: steps.lint.outputs.has_errors == 'true'
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Search for an existing open issue with the same title to avoid duplicates
          EXISTING=$(gh issue list \
            --state open \
            --search "Workflow lint errors detected in:title" \
            --json number \
            --jq '.[0].number // empty' 2>/dev/null || true)

          if [ -n "$EXISTING" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "number=${EXISTING}" >> "$GITHUB_OUTPUT"
            echo "Found existing lint issue #${EXISTING}"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No existing lint issue found"
          fi

      - name: Update existing issue
        if: steps.lint.outputs.has_errors == 'true' && steps.existing.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.existing.outputs.number }}
        run: |
          set -euo pipefail
          echo "Updating existing issue #${ISSUE_NUMBER} with latest lint results..."
          gh issue comment "$ISSUE_NUMBER" --body-file /tmp/issue-body.md

      - name: Create new lint issue
        if: steps.lint.outputs.has_errors == 'true' && steps.existing.outputs.found != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Create issue with lint results for manual or agentic remediation
          NEW_ISSUE=$(gh issue create \
            --title "Workflow lint errors detected" \
            --body-file /tmp/issue-body.md \
            --label "bug" 2>&1)

          echo "Created lint issue: ${NEW_ISSUE}"

      - name: Summary
        if: always()
        run: |
          {
            echo "## Workflow Lint Results"
            echo ""
            echo "- **Errors found:** ${{ steps.lint.outputs.error_count || '0' }}"
            echo "- **Has errors:** ${{ steps.lint.outputs.has_errors || 'false' }}"
          } >> "$GITHUB_STEP_SUMMARY"
