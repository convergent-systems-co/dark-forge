name: Prompt Catalog

on:
  push:
    branches: [main]
    paths:
      - "governance/prompts/**"
      - "prompts/**"
      - "bin/generate-prompt-catalog.py"
      - "governance/schemas/prompt-catalog.schema.json"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    name: generate-catalog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Generate prompt catalog
        run: python bin/generate-prompt-catalog.py --validate

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet catalog/prompt-catalog.json && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit updated catalog
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog/prompt-catalog.json
          git commit -m "chore: regenerate prompt catalog [skip ci]"
          git push
