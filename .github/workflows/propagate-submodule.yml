name: Propagate .ai update

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  changelog:
    runs-on: ubuntu-latest
    outputs:
      summary: ${{ steps.diff.outputs.summary }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: diff
        run: |
          PREV_SHA="${{ github.event.before }}"
          CURR_SHA="${{ github.sha }}"
          SUMMARY=$(git log --oneline "${PREV_SHA}..${CURR_SHA}" | head -20)
          echo "summary<<EOF" >> "$GITHUB_OUTPUT"
          echo "$SUMMARY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

  update-consumers:
    needs: changelog
    # Disabled until consuming repos are configured.
    # To enable: replace the example entry with real org/repo values.
    if: false
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Add consuming repos here. Each entry is org/repo.
        repo:
          - SET-Apps/example-project
    steps:
      - name: Validate token
        env:
          TOKEN: ${{ secrets.SUBMODULE_PROPAGATION_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::SUBMODULE_PROPAGATION_TOKEN secret is not configured."
            exit 1
          fi

      - name: Checkout consuming repo
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.repo }}
          token: ${{ secrets.SUBMODULE_PROPAGATION_TOKEN }}
          submodules: true
          fetch-depth: 0

      - name: Update .ai submodule
        run: |
          git submodule update --remote .ai
          if git diff --quiet; then
            echo "No submodule changes. Skipping."
            echo "SKIP=true" >> "$GITHUB_ENV"
          fi

      - name: Create pull request
        if: env.SKIP != 'true'
        uses: peter-evans/create-pull-request@a4f9ee0a867d4bbb4f0cc9c7d818bd1e67b28aae # v7.0.8
        with:
          token: ${{ secrets.SUBMODULE_PROPAGATION_TOKEN }}
          commit-message: "chore: update .ai submodule to ${{ github.sha }}"
          title: "chore: update .ai governance submodule"
          body: |
            ## .ai Submodule Update

            Auto-generated PR to update the `.ai` governance submodule pointer.

            **Source:** [${{ github.repository }}@${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})

            ### Changes included
            ```
            ${{ needs.changelog.outputs.summary }}
            ```

            ---
            🤖 Generated by [propagate-submodule](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) workflow
          branch: chore/update-ai-submodule
          delete-branch: true
