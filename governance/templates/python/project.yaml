# Python Project Configuration
# Copy to project.yaml in your project root and customize.

name: "my-python-project"
language: "python"
framework: ""                    # fastapi, django, flask, cli

personas:
  - quality/code-reviewer.md
  - quality/adversarial-reviewer.md
  - engineering/test-engineer.md
  - engineering/performance-engineer.md
  - compliance/security-auditor.md
  # - operations/sre.md

# Panels to run on every change
# The 6 below are REQUIRED by governance/policy/default.yaml.
panels:
  # --- required by default policy ---
  - code-review.md
  - security-review.md
  - threat-modeling.md
  - cost-analysis.md
  - documentation-review.md
  - data-governance-review.md
  # --- optional ---
  - architecture-review.md
  # - production-readiness-review.md
  # - performance-review.md

# repository:
#   auto_merge: false
#   delete_branch_on_merge: true

# governance:
#   skip_panel_validation: false
#   policy_profile: "default"

conventions:
  testing:
    framework: "pytest"
    naming: "test_*"
    coverage_target: 80
    async: "pytest-asyncio"
  style:
    max_line_length: 100           # ruff default is 88; 100 is common override
    indent: "spaces"
    indent_size: 4
    linter: "ruff"
    formatter: "ruff format"
    type_checker: "mypy"           # mypy, pyright
  architecture:
    layout: "src"                  # src layout with pyproject.toml
    validation: "pydantic"
    error_handling: "custom-exceptions"
  tooling:
    package_manager: "uv"          # uv, poetry, pip-tools
    min_python: "3.11"
  git:
    branch_pattern: "feature/{ticket}-{description}"
    commit_style: "conventional"
    pr_template: true

instructions: |
  - Use src/ layout with pyproject.toml as single source of truth
  - Enable mypy strict mode
  - Use ruff for all linting and formatting
  - Validate external input with Pydantic
