# AI Configuration

# Version of this configuration (for sync tracking)
version: "1.0.0"

# Default templates to apply
defaults:
  instructions: true
  architecture: true
  prompts: true

# Tool-specific symlinks to create
symlinks:
  - source: instructions.md
    targets:
      - .github/copilot-instructions.md
      - CLAUDE.md
      - .cursorrules

# Governance workflows to copy to consuming repos during init
# Only copied in submodule context; skip-if-exists prevents overwriting
workflows_to_copy:
  - dark-factory-governance.yml

# Directories to create in consuming repos during init
# These are created with .gitkeep files so git tracks empty directories
# Consuming projects can add additional directories in project.yaml
project_directories:
  - path: .plans
    description: "Implementation plans for issues and features"
  - path: .panels
    description: "Panel reports — only latest per panel type"

# Gitignore patterns for .ai/
gitignore:
  - context.md
  - "*.local.md"

# Repository settings applied by init.sh via gh api
# These are defaults; consuming projects override in project.yaml
repository:
  # GitHub repo settings
  auto_merge: false  # opt-in: consuming repos must explicitly enable in project.yaml
  delete_branch_on_merge: true
  allow_squash_merge: true
  allow_merge_commit: true
  allow_rebase_merge: true

  # CODEOWNERS template (generated if file is empty or missing)
  codeowners:
    enabled: true
    default_owner: "@SET-Apps/approvers"
    rules:
      - pattern: "/.github/workflows/"
        owners: ["@SET-Apps/devops_engineers"]
      - pattern: "/infra/"
        owners: ["@SET-Apps/devops_engineers"]
      - pattern: "/.ai"
        owners: ["@SET-Apps/approvers"]

  # Branch protection expectations (validated, not applied)
  branch_protection:
    expected_rulesets:
      - name: "Pull Request - Reviewer"
        required_approving_review_count: 1
        require_code_owner_review: true
      - name: "Pull Request - Base"
      - name: "JM Compliance Workflow"
