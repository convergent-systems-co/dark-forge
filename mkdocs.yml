site_name: Dark Factory Governance Framework
site_description: AI governance framework for autonomous software delivery
site_url: https://probable-adventure-7e9l4jw.pages.github.io/

theme:
  name: material
  palette:
    scheme: slate
    primary: deep purple
    accent: cyan
  logo: assets/logo.svg
  favicon: assets/logo.svg
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.sticky
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - toc.integrate

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Getting Started:
    - Simple Explainer: onboarding/eli5.md
    - Developer Guide: onboarding/developer-guide.md
    - End-to-End Walkthrough: tutorials/end-to-end-walkthrough.md
  - Architecture:
    - Governance Model: architecture/governance-model.md
    - Agent Architecture: architecture/agent-architecture.md
    - Context Management: architecture/context-management.md
    - Mass Parallelization: architecture/mass-parallelization.md
    - Event-Driven Triggers: architecture/event-driven-triggers.md
    - Runtime Feedback: architecture/runtime-feedback.md
    - Cross-Repo Escalation: architecture/cross-repo-escalation.md
    - Session State Persistence: architecture/session-state-persistence.md
    - Formal Specification: architecture/formal-spec.md
  - Configuration:
    - Repository Setup: configuration/repository-setup.md
    - CI Gating: configuration/ci-gating.md
    - Copilot Integration: configuration/copilot-integration.md
  - Governance:
    - Artifact Classification: governance/artifact-classification.md
    - Acceptance Verification: governance/acceptance-verification.md
    - Manifest Lifecycle: governance/manifest-lifecycle.md
    - Naming Review: governance/naming-review.md
  - Operations:
    - Autonomy Metrics: operations/autonomy-metrics.md
    - Migration Summary: operations/migration-summary.md
    - Retrospective Aggregation: operations/retrospective-aggregation.md
    - Threshold Tuning: operations/threshold-tuning.md
    - Token Costs: operations/token-costs.md
  - Research:
    - Overview: research/README.md
    - Technique Comparison: research/technique-comparison.md
  - Decisions: decisions/README.md
